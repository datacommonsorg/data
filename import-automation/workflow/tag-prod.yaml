substitutions:
  _AR_REPO_URL: 'us-docker.pkg.dev/datcom-ci/gcr.io'
  _PROD_TAG: 'latest'
  _VERSION: 'latest'
  _TEMPLATE_BUCKET: 'datcom-templates'

steps:
- id: 'tag-ingestion-helper'
  name: 'gcr.io/cloud-builders/gcloud'
  args: ['container', 'images', 'add-tag', '${_AR_REPO_URL}/datacommons-ingestion-helper:${_VERSION}', '${_AR_REPO_URL}/datacommons-ingestion-helper:${_PROD_TAG}', '--quiet']

- id: 'tag-import-helper'
  name: 'gcr.io/cloud-builders/gcloud'
  args: ['container', 'images', 'add-tag', '${_AR_REPO_URL}/datacommons-import-helper:${_VERSION}', '${_AR_REPO_URL}/datacommons-import-helper:${_PROD_TAG}', '--quiet']

- id: 'update-dataflow-template'
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gsutil'
  args:
    - 'cp'
    - 'gs://${_TEMPLATE_BUCKET}/templates/flex/ingestion.json'
    - 'gs://${_TEMPLATE_BUCKET}/templates/flex/ingestion-${_PROD_TAG}.json'

options:
  logging: CLOUD_LOGGING_ONLY
